<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Envoi Facturette</title>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 32px 24px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    }

    .logo {
      text-align: center;
      margin-bottom: 24px;
    }

    .logo .icon {
      font-size: 48px;
      display: block;
      margin-bottom: 8px;
    }

    .logo h1 {
      font-size: 20px;
      font-weight: 700;
      color: #1a2e1a;
    }

    .logo p {
      font-size: 13px;
      color: #6b7280;
      margin-top: 4px;
    }

    /* Zone de photo */
    .photo-zone {
      border: 2.5px dashed #c3d4b8;
      border-radius: 16px;
      background: #f7faf5;
      padding: 32px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      margin-bottom: 20px;
    }

    .photo-zone:hover, .photo-zone.dragover {
      border-color: #4a7c35;
      background: #eef5ea;
    }

    .photo-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .photo-zone .camera-icon {
      font-size: 52px;
      display: block;
      margin-bottom: 10px;
    }

    .photo-zone .label {
      font-size: 16px;
      font-weight: 600;
      color: #2d5a1b;
      display: block;
    }

    .photo-zone .sublabel {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 4px;
    }

    /* Preview */
    #preview-wrap {
      display: none;
      margin-bottom: 20px;
      text-align: center;
    }

    #preview-wrap img {
      width: 100%;
      max-height: 300px;
      object-fit: contain;
      border-radius: 12px;
      border: 2px solid #c3d4b8;
    }

    #preview-wrap .change-btn {
      display: inline-block;
      margin-top: 10px;
      font-size: 13px;
      color: #4a7c35;
      cursor: pointer;
      text-decoration: underline;
    }

    /* Bouton envoi */
    .btn-send {
      width: 100%;
      padding: 16px;
      background: #2d5a1b;
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-send:hover:not(:disabled) { background: #3d7a28; }
    .btn-send:active:not(:disabled) { transform: scale(0.98); }
    .btn-send:disabled { background: #9ca3af; cursor: not-allowed; }

    /* États */
    .status {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      text-align: center;
      display: none;
    }

    .status.success {
      background: #d1fae5;
      color: #065f46;
      display: block;
    }

    .status.error {
      background: #fee2e2;
      color: #991b1b;
      display: block;
    }

    .status.loading {
      background: #e0f2fe;
      color: #0369a1;
      display: block;
    }

    .divider {
      height: 1px;
      background: #e5e7eb;
      margin: 20px 0;
    }

    .info-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #6b7280;
    }

    .info-row span:first-child { font-size: 16px; }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <span class="icon">🥩</span>
    <h1>Envoi de facturette</h1>
    <p>Prenez la photo et appuyez sur Envoyer</p>
  </div>

  <!-- Zone photo -->
  <div class="photo-zone" id="photo-zone">
    <input type="file" id="file-input" accept="image/*" capture="environment" />
    <span class="camera-icon">📷</span>
    <span class="label">Prendre / Choisir la photo</span>
    <span class="sublabel">JPG, PNG — appuyez n'importe où</span>
  </div>

  <!-- Aperçu -->
  <div id="preview-wrap">
    <img id="preview-img" src="" alt="Aperçu" />
    <span class="change-btn" id="change-btn">Changer la photo</span>
  </div>

  <!-- Bouton -->
  <button class="btn-send" id="btn-send" disabled>
    <span>📤</span> Envoyer à Madivial
  </button>

  <!-- Statut -->
  <div class="status" id="status"></div>

  <div class="divider"></div>

  <div class="info-row">
    <span>🕐</span>
    <span id="datetime-display"></span>
  </div>
</div>

<script>
  // =============================================
  // ⚙️  CONFIGURATION — À REMPLIR
  // =============================================
  const EMAILJS_PUBLIC_KEY  = "hDU0gLl_Bd50s6iNf";
  const EMAILJS_SERVICE_ID  = "service_omfazit";
  const EMAILJS_TEMPLATE_ID = "template_jgsycxr";
  // =============================================

  emailjs.init(EMAILJS_PUBLIC_KEY);

  const fileInput   = document.getElementById("file-input");
  const photoZone   = document.getElementById("photo-zone");
  const previewWrap = document.getElementById("preview-wrap");
  const previewImg  = document.getElementById("preview-img");
  const changeBtn   = document.getElementById("change-btn");
  const btnSend     = document.getElementById("btn-send");
  const statusEl    = document.getElementById("status");
  const dtDisplay   = document.getElementById("datetime-display");

  let selectedFile = null;

  // Horodatage en temps réel
  function updateTime() {
    const now = new Date();
    const opts = { weekday:'long', day:'numeric', month:'long', year:'numeric',
                   hour:'2-digit', minute:'2-digit' };
    dtDisplay.textContent = now.toLocaleDateString('fr-FR', opts);
  }
  updateTime();
  setInterval(updateTime, 60000);

  // Gestion du fichier sélectionné
  fileInput.addEventListener("change", (e) => {
    const file = e.target.files[0];
    if (!file) return;
    selectedFile = file;
    const url = URL.createObjectURL(file);
    previewImg.src = url;
    photoZone.style.display = "none";
    previewWrap.style.display = "block";
    btnSend.disabled = false;
    statusEl.className = "status";
    statusEl.textContent = "";
  });

  // Changer la photo
  changeBtn.addEventListener("click", () => {
    selectedFile = null;
    fileInput.value = "";
    previewWrap.style.display = "none";
    photoZone.style.display = "block";
    btnSend.disabled = true;
  });

  // Envoi
  btnSend.addEventListener("click", async () => {
    if (!selectedFile) return;

    btnSend.disabled = true;
    setStatus("loading", "⏳ Envoi en cours…");

    const now = new Date();
    const dateStr = now.toLocaleDateString('fr-FR');
    const heureStr = now.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });

    // Compresser et convertir en base64
    const base64 = await compressAndEncode(selectedFile);

    const templateParams = {
      date:  dateStr,
      heure: heureStr,
      photo: base64,
      filename: selectedFile.name || "facturette.jpg",
    };

    try {
      await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams);
      setStatus("success", "✅ Photo envoyée ! La coopérative va recevoir la facturette.");
      // Reset après succès
      setTimeout(() => {
        selectedFile = null;
        fileInput.value = "";
        previewWrap.style.display = "none";
        photoZone.style.display = "block";
        btnSend.disabled = true;
        statusEl.className = "status";
      }, 4000);
    } catch (err) {
      console.error(err);
      setStatus("error", "❌ Échec de l'envoi. Vérifiez votre connexion et réessayez.");
      btnSend.disabled = false;
    }
  });

  function setStatus(type, msg) {
    statusEl.className = "status " + type;
    statusEl.textContent = msg;
  }

  function compressAndEncode(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onerror = reject;
      reader.onload = (e) => {
        const img = new Image();
        img.onerror = reject;
        img.onload = () => {
          const canvas = document.createElement("canvas");
          const MAX = 1200;
          let w = img.width, h = img.height;
          if (w > MAX || h > MAX) {
            if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
            else       { w = Math.round(w * MAX / h); h = MAX; }
          }
          canvas.width = w;
          canvas.height = h;
          canvas.getContext("2d").drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL("image/jpeg", 0.7));
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  }
</script>
</body>
</html>
